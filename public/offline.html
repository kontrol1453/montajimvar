<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bağlantı Hatası - Montajım Var</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #111318;
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .container { text-align: center; max-width: 400px; }
    .icon { width: 80px; height: 80px; margin: 0 auto 24px; background: #1f2128; border-radius: 20px; display: flex; align-items: center; justify-content: center; }
    .icon svg { width: 40px; height: 40px; color: #ff7a00; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    p { color: #6b7280; line-height: 1.6; margin-bottom: 24px; }
    button {
      background: #ff7a00;
      color: #111318;
      border: none;
      padding: 12px 32px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" />
      </svg>
    </div>
    <h1>Bağlantı Hatası</h1>
    <p>İnternet bağlantınızı kontrol edin ve tekrar deneyin.</p>
    <button onclick="window.location.reload()">Tekrar Dene</button>
  </div>
</body>
</html>
