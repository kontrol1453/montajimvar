workflows:
  ios-preview:
    name: iOS Preview Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      groups:
        - app_store_credentials
      vars:
        BUNDLE_ID: "com.kontrol1453.montajimvar"
    scripts:
      - name: Install dependencies
        script: |
          cd mobile
          npm ci --legacy-peer-deps
      - name: Install Expo
        script: |
          cd mobile
          npm install expo@~56.0.12 --legacy-peer-deps
      - name: Fix Expo
        script: |
          cd mobile
          npx expo install --fix
      - name: Build iOS
        script: |
          cd mobile
          npx eas build --platform ios --profile preview --non-interactive
    artifacts:
      - build/ios/*.ipa
    publishing:
      email:
        recipients:
          - your@email.com
    environment:
      groups:
        - app_store_credentials
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_API_KEY_BASE64
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID