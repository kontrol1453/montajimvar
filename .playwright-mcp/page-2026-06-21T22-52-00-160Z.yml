            - listitem [ref=e65]: Yurt içinde veya yurt dışında kişisel verilerinizin aktarıldığı üçüncü kişileri bilme
            - listitem [ref=e66]: Eksik veya yanlış işlenmişse bunların düzeltilmesini isteme
            - listitem [ref=e67]: Kişisel verilerinizin silinmesini veya yok edilmesini isteme
            - listitem [ref=e68]: Verilerinizin işlenmesine itiraz etme
