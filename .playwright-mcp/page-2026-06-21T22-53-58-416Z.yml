            - listitem [ref=e74]: Vitrin (öne çıkan) hizmeti ödeme onayından sonra aktif olur.
            - listitem [ref=e75]: "İade koşulları: Hizmet başladığında (profil vitrine alındığında) iade hakkı yoktur (Tüketicinin Korunması Hakkında Kanun Madde 15)."
            - listitem [ref=e76]: Fatura/ekstre e-posta ile gönderilir.
        - generic [ref=e77]:
