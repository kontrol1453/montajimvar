          - heading "1. Taraflar" [level=2] [ref=e21]
          - paragraph [ref=e22]: Bu Sözleşme, Montajım Var platformu ("Platform", "Biz") ile platformu kullanan gerçek veya tüzel kişiler ("Kullanıcı", "Siz") arasında, Platform üzerinden sağlanan hizmetlerin kullanım koşullarını düzenler.
        - generic [ref=e23]:
          - heading "2. Sözleşmenin Kapsamı ve Kabulü" [level=2] [ref=e24]
          - paragraph [ref=e25]: Platforma erişerek, üye olarak veya misafir olarak kullanarak, bu Kullanım Koşullarını, Gizlilik Politikasını ve Çerez Politikasını okuduğunuzu, anladığınızı ve kabul ettiğinizi beyan etmiş olursunuz. Bu koşulları kabul etmiyorsanız Platformu kullanmayınız.
        - generic [ref=e26]:
          - heading "3. Hizmet Tanımı" [level=2] [ref=e27]
          - paragraph [ref=e28]: "Montajım Var; montaj firmaları, üreticiler ve müşterileri bir araya getiren bir çevrimiçi platformdur. Sağlanan temel hizmetler:"
          - list [ref=e29]:
            - listitem [ref=e30]: Firma profili oluşturma ve yönetme
            - listitem [ref=e31]: Montaj firmalarını arama, filtreleme ve görüntüleme
            - listitem [ref=e32]: Firmalarla iletişim kurma (mesajlaşma, WhatsApp, telefon)
            - listitem [ref=e33]: Değerlendirme ve puanlama sistemi
            - listitem [ref=e34]: Favori listesi oluşturma
            - listitem [ref=e35]: Premium üyelik ve vitrin (öne çıkan) hizmetleri
        - generic [ref=e36]:
          - heading "4. Üyelik ve Hesap Güvenliği" [level=2] [ref=e37]
          - list [ref=e38]:
            - listitem [ref=e39]: Kullanıcılar, kayıt sırasında doğru, güncel ve eksiksiz bilgi verme yükümlülüğündedir.
            - listitem [ref=e40]: Hesap şifresinin gizliliği kullanıcıya aittir. Şifre paylaşılmamalıdır.
            - listitem [ref=e41]: Hesabınızın başkaları tarafından kullanılmasından sorumlu sizsiniz.
            - listitem [ref=e42]: Şüpheli aktivite tespit edilirse hesabınız geçici olarak askıya alınabilir.
            - listitem [ref=e43]: Birden fazla hesap açmak yasaktır (tek bir kişi/şirket için tek hesap).
        - generic [ref=e44]:
          - heading "5. Kullanıcı Sorumlulukları ve Yasaklı Eylemler" [level=2] [ref=e45]
          - paragraph [ref=e46]: "Platformu kullanırken aşağıdakiler yasaktır:"
          - list [ref=e47]:
            - listitem [ref=e48]: Yasalara aykırı, dürüstlük kurallarına uygun olmayan içerik paylaşmak
            - listitem [ref=e49]: Başkalarının telif hakları, marka hakları veya gizliliğini ihlal etmek
            - listitem [ref=e50]: Spam, sahte hesap, kimlik avı (phishing) veya dolandırıcılık yapmak
            - listitem [ref=e51]: Platformun altyapısına zarar vermeye çalışmak, veri kazıyıcı (scraper) kullanmak
            - listitem [ref=e52]: Diğer kullanıcıları taciz etmek, tehdit etmek veya rahatsız etmek
            - listitem [ref=e53]: Yanıltıcı, yalan veya ölçüsüz reklamcılık yapmak
            - listitem [ref=e54]: Platform dışında ödeme/iletişim yaparak Platformun komisyon sistemini bypass etmek
        - generic [ref=e55]:
          - heading "6. Firma Profilleri ve İçerik" [level=2] [ref=e56]
          - list [ref=e57]:
            - listitem [ref=e58]: Firma profillerindeki bilgilerin doğruluğu firma sahibine aittir.
            - listitem [ref=e59]: Platform, firmaların sunduğu hizmetlerin kalitesinden, fiyatından veya güvenilirliğinden sorumlu değildir.
            - listitem [ref=e60]: Değerlendirmeler (yorumlar/puanlar) sadece gerçek deneyimlere dayanmalıdır. Sahte yorum yasaktır.
            - listitem [ref=e61]: Platform, uygunsuz içerikleri (küfür, reklam, spam, yasalara aykırı) önceden haber vermeden kaldırma hakkını saklı tutar.
            - listitem [ref=e62]: Fotoğrafların telif hakkı yüklenecek kişiye aittir. Telif ihlali bildiriminde içerik kaldırılır.
        - generic [ref=e63]:
