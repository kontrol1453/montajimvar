            - listitem [ref=e67]: Mesaj içerikleri Platform tarafından izlenebilir (güvenlik, spam önleme).
            - listitem [ref=e68]: Kişisel veriler (telefon, e-posta, adres) mesajlaşma sırasında paylaşılırsa bu taraflar arasında kalır.
            - listitem [ref=e69]: Platform dışında yapılan iletişimden/sözleşmeden Platform sorumlu tutulamaz.
        - generic [ref=e70]:
